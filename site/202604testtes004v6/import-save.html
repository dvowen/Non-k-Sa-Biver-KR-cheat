<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Non-k Sa-BIVER Save Import</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #111;
        color: #f5f5f5;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(900px, 100%);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 28px;
      }

      p,
      li {
        color: #d5d5d5;
        line-height: 1.6;
      }

      code,
      pre,
      textarea {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }

      pre {
        overflow: auto;
        padding: 16px;
        border: 1px solid #333;
        border-radius: 8px;
        background: #181818;
        color: #e8e8e8;
      }

      textarea {
        box-sizing: border-box;
        width: 100%;
        min-height: 220px;
        margin: 16px 0;
        padding: 14px;
        resize: vertical;
        border: 1px solid #444;
        border-radius: 8px;
        background: #161616;
        color: #f5f5f5;
        font-size: 14px;
        line-height: 1.5;
      }

      button,
      a.button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 0 16px;
        border: 1px solid #555;
        border-radius: 8px;
        background: #262626;
        color: #fff;
        text-decoration: none;
        cursor: pointer;
        font-weight: 600;
      }

      button.primary {
        border-color: #b91c1c;
        background: #991b1b;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
      }

      .status {
        min-height: 24px;
        margin-top: 14px;
        color: #fbbf24;
      }

      .ok {
        color: #86efac;
      }

      .error {
        color: #fca5a5;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>세이브 가져오기</h1>
      <p>
        원본 사이트의 <code>localStorage</code> 세이브 키
        <code>loot_and_link_save_v1</code>를 로컬 테스트 서버에 복사합니다.
      </p>

      <h2>1. 원본 사이트에서 export</h2>
      <p>
        <a href="https://funa-funa.sakura.ne.jp/202604testtes004v6/" target="_blank" rel="noreferrer">
          원본 사이트
        </a>
        를 연 뒤 개발자 도구 콘솔에서 아래 코드를 실행하세요. 실행하면 클립보드에 복사되고,
        실패해도 콘솔에 JSON이 출력됩니다.
      </p>
      <pre id="exportSnippet"></pre>

      <h2>2. 아래에 붙여넣고 import</h2>
      <textarea id="saveInput" spellcheck="false" placeholder="원본 사이트에서 export한 JSON을 붙여넣으세요."></textarea>

      <div class="actions">
        <button class="primary" id="importButton" type="button">로컬에 적용</button>
        <button id="backupButton" type="button">현재 로컬 세이브 백업</button>
        <a class="button" href="/202604testtes004v6/">게임 열기</a>
      </div>

      <div class="status" id="status"></div>
    </main>

    <script>
      const SAVE_KEY = "loot_and_link_save_v1";
      const statusEl = document.getElementById("status");
      const saveInput = document.getElementById("saveInput");
      const exportSnippet = document.getElementById("exportSnippet");

      exportSnippet.textContent = `(() => {
  const key = "${SAVE_KEY}";
  const data = {
    exportedAt: new Date().toISOString(),
    origin: location.origin,
    key,
    value: localStorage.getItem(key)
  };
  const text = JSON.stringify(data, null, 2);
  navigator.clipboard?.writeText(text).catch(() => {});
  console.log(text);
  return data;
})()`;

      function setStatus(message, className = "") {
        statusEl.className = `status ${className}`;
        statusEl.textContent = message;
      }

      function downloadText(filename, text) {
        const blob = new Blob([text], { type: "application/json;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = filename;
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
      }

      function extractSaveValue(input) {
        const parsed = JSON.parse(input);
        if (typeof parsed === "string") return parsed;
        if (parsed && typeof parsed === "object") {
          if (typeof parsed.value === "string") return parsed.value;
          if (parsed.key === SAVE_KEY && parsed.value && typeof parsed.value === "object") {
            return JSON.stringify(parsed.value);
          }
          if (parsed.version && parsed.player && parsed.flags) return JSON.stringify(parsed);
        }
        throw new Error("세이브 JSON 형식을 인식하지 못했습니다.");
      }

      document.getElementById("backupButton").addEventListener("click", () => {
        const current = localStorage.getItem(SAVE_KEY);
        if (!current) {
          setStatus("현재 로컬 세이브가 없습니다.", "error");
          return;
        }
        const backup = {
          exportedAt: new Date().toISOString(),
          origin: location.origin,
          key: SAVE_KEY,
          value: current,
        };
        downloadText(`local-save-${Date.now()}.json`, JSON.stringify(backup, null, 2));
        setStatus("현재 로컬 세이브를 파일로 백업했습니다.", "ok");
      });

      document.getElementById("importButton").addEventListener("click", () => {
        try {
          const value = extractSaveValue(saveInput.value.trim());
          const save = JSON.parse(value);
          if (!save || typeof save !== "object" || !save.player || !save.flags) {
            throw new Error("게임 세이브처럼 보이지 않습니다.");
          }

          const current = localStorage.getItem(SAVE_KEY);
          if (current) {
            localStorage.setItem(`${SAVE_KEY}_backup_${Date.now()}`, current);
          }

          localStorage.setItem(SAVE_KEY, JSON.stringify(save));
          setStatus("로컬 세이브에 적용했습니다. 게임을 열고 이어하기를 선택하세요.", "ok");
        } catch (error) {
          setStatus(error instanceof Error ? error.message : String(error), "error");
        }
      });
    </script>
  </body>
</html>
